services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: play_turf
      POSTGRES_PASSWORD: play_turf
      POSTGRES_DB: play_turf
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U play_turf -d play_turf" ]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: docker
      DEBUG: "true"
      DATABASE_URL: postgresql+psycopg://play_turf:play_turf@postgres:5432/play_turf
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: change-this-in-production
      ACCESS_TOKEN_TTL_MINUTES: "15"
      REFRESH_TOKEN_TTL_DAYS: "7"
      SECURE_COOKIES: "false"

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./components:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3030"
    environment:
      VITE_BACKEND_URL: http://localhost:8000
    ports:
      - "3030:3030"
    depends_on:
      - backend

volumes:
  postgres_data:
