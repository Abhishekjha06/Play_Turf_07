<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Turf — Architecture Map</title>
    <style>
        :root {
            --bg: #0F0F0F;
            --panel: #161616;
            --panel-2: #1c1c1c;
            --border: #2a2a2a;
            --text: #e8e8e8;
            --muted: #8a8a8a;
            --frontend: #4ea1ff;
            --api: #7bd389;
            --auth: #c792ea;
            --booking: #ffb86b;
            --database: #ff6b9d;
            --external: #f5b942;
            --critical: #ff3860;
            --dead: #ff4444;
            --warning: #ffaa00;
            --success: #00cc88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #app {
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 360px;
            min-width: 360px;
            background: var(--panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }

        #sidebar-header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        #sidebar-header .subtitle {
            font-size: 12px;
            color: var(--muted);
            margin-top: 2px;
        }

        #sidebar-header .stats {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            font-size: 11px;
            color: var(--muted);
        }

        #sidebar-header .stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }

        #sidebar-content::-webkit-scrollbar {
            width: 4px;
        }

        #sidebar-content::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .sidebar-section {
            margin-bottom: 20px;
        }

        .sidebar-section h3 {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .sidebar-section p {
            font-size: 13px;
            line-height: 1.6;
            color: var(--text);
        }

        .sidebar-section .tag {
            display: inline-block;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
            margin: 2px;
            font-weight: 600;
        }

        .tag-frontend {
            background: rgba(78, 161, 255, 0.15);
            color: var(--frontend);
        }

        .tag-api {
            background: rgba(123, 211, 137, 0.15);
            color: var(--api);
        }

        .tag-auth {
            background: rgba(199, 146, 234, 0.15);
            color: var(--auth);
        }

        .tag-booking {
            background: rgba(255, 184, 107, 0.15);
            color: var(--booking);
        }

        .tag-database {
            background: rgba(255, 107, 157, 0.15);
            color: var(--database);
        }

        .tag-external {
            background: rgba(245, 185, 66, 0.15);
            color: var(--external);
        }

        .tag-critical {
            background: rgba(255, 56, 96, 0.2);
            color: var(--critical);
        }

        .tag-dead {
            background: rgba(255, 68, 68, 0.2);
            color: var(--dead);
        }

        .tag-warning {
            background: rgba(255, 170, 0, 0.2);
            color: var(--warning);
        }

        .tag-success {
            background: rgba(0, 204, 136, 0.2);
            color: var(--success);
        }

        .edge-list {
            list-style: none;
        }

        .edge-list li {
            font-size: 12px;
            padding: 4px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .edge-list li .edge-type {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: 600;
        }

        .edge-critical {
            background: rgba(255, 56, 96, 0.2);
            color: var(--critical);
        }

        .edge-api {
            background: rgba(78, 161, 255, 0.2);
            color: var(--frontend);
        }

        .edge-db {
            background: rgba(255, 107, 157, 0.2);
            color: var(--database);
        }

        .edge-auth {
            background: rgba(199, 146, 234, 0.2);
            color: var(--auth);
        }

        .edge-payment {
            background: rgba(245, 185, 66, 0.2);
            color: var(--external);
        }

        .edge-websocket {
            background: rgba(123, 211, 137, 0.2);
            color: var(--api);
        }

        .edge-normal {
            background: rgba(138, 138, 138, 0.2);
            color: var(--muted);
        }

        .notes-list {
            list-style: none;
        }

        .notes-list li {
            font-size: 12px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            color: var(--muted);
            line-height: 1.5;
        }

        .notes-list li::before {
            content: '•';
            color: var(--muted);
            margin-right: 6px;
        }

        #main {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        #canvas-container svg {
            width: 100%;
            height: 100%;
        }

        #filters {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            z-index: 10;
            pointer-events: none;
        }

        #filters button {
            pointer-events: auto;
        }

        .filter-chip {
            font-size: 11px;
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .filter-chip:hover {
            border-color: var(--text);
            color: var(--text);
        }

        .filter-chip.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
            font-weight: 600;
        }

        #zoom-controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 4px;
            z-index: 10;
        }

        #zoom-controls button {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text);
            cursor: pointer;
            font-size: 16px;
            display: grid;
            place-items: center;
            transition: all 0.2s;
        }

        #zoom-controls button:hover {
            background: var(--panel-2);
        }

        #zoom-level {
            font-size: 11px;
            color: var(--muted);
            display: grid;
            place-items: center;
            padding: 0 8px;
        }

        #legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: var(--muted);
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .node-group {
            cursor: pointer;
        }

        .node-group:hover .node-bg {
            filter: brightness(1.3);
        }

        .node-group.selected .node-bg {
            filter: brightness(1.4);
            stroke-width: 2.5;
        }

        .node-group.dead .node-bg {
            stroke: var(--dead);
            stroke-dasharray: 4, 3;
        }

        .node-bg {
            transition: filter 0.2s, stroke 0.2s;
        }

        .node-label {
            font-size: 11px;
            font-weight: 600;
            fill: var(--text);
            text-anchor: middle;
        }

        .node-sub {
            font-size: 9px;
            fill: var(--muted);
            text-anchor: middle;
        }

        .node-tag {
            font-size: 8px;
            font-weight: 700;
            text-anchor: middle;
            text-transform: uppercase;
        }

        .edge-line {
            fill: none;
            stroke-width: 1.5;
            transition: stroke 0.2s, stroke-width 0.2s;
        }

        .edge-line:hover {
            stroke-width: 2.5;
        }

        .edge-line.highlighted {
            stroke-width: 2.5;
        }

        .edge-label {
            font-size: 8px;
            fill: var(--muted);
            text-anchor: middle;
        }

        .edge-type-label {
            font-size: 7px;
            font-weight: 600;
            text-anchor: middle;
            text-transform: uppercase;
        }

        .cluster-bg {
            fill: var(--panel-2);
            stroke: var(--border);
            stroke-width: 1;
            rx: 12;
        }

        .cluster-label {
            font-size: 13px;
            font-weight: 700;
            fill: var(--text);
        }

        .cluster-count {
            font-size: 10px;
            fill: var(--muted);
        }

        .flow-arrow {
            fill: none;
            stroke-width: 2;
            marker-end: url(#arrowhead);
        }

        .flow-arrow-critical {
            stroke: var(--critical);
        }

        .flow-arrow-normal {
            stroke: var(--muted);
        }

        .flow-arrow-auth {
            stroke: var(--auth);
        }

        .flow-arrow-api {
            stroke: var(--frontend);
        }

        .flow-arrow-db {
            stroke: var(--database);
        }

        .flow-arrow-payment {
            stroke: var(--external);
        }

        .flow-arrow-websocket {
            stroke: var(--api);
        }

        #tooltip {
            position: absolute;
            display: none;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 12px;
            max-width: 280px;
            z-index: 100;
            pointer-events: none;
        }

        #tooltip.visible {
            display: block;
        }

        #tooltip h4 {
            font-size: 13px;
            margin-bottom: 4px;
        }

        #tooltip p {
            color: var(--muted);
            font-size: 11px;
            line-height: 1.5;
        }

        .findings-item {
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .findings-item:last-child {
            border-bottom: none;
        }

        .findings-item h4 {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .findings-item p {
            font-size: 11px;
            color: var(--muted);
            line-height: 1.5;
        }

        .findings-item .severity {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 1px 6px;
            border-radius: 3px;
        }

        .severity-high {
            background: rgba(255, 56, 96, 0.2);
            color: var(--critical);
        }

        .severity-medium {
            background: rgba(255, 170, 0, 0.2);
            color: var(--warning);
        }

        .severity-low {
            background: rgba(0, 204, 136, 0.2);
            color: var(--success);
        }
    </style>
</head>

<body>
    <div id="app">
        <div id="sidebar">
            <div id="sidebar-header">
                <h1>⚽ Play Turf</h1>
                <div class="subtitle">Architecture Map — Full-Stack Sports Turf Booking Platform</div>
                <div class="stats">
                    <span id="stat-nodes">● 0 nodes</span>
                    <span id="stat-edges">─ 0 edges</span>
                    <span id="stat-clusters">▣ 0 clusters</span>
                </div>
            </div>
            <div id="sidebar-content">
                <div id="sidebar-default">
                    <div class="sidebar-section">
                        <h3>Notable Findings</h3>
                        <div id="findings-list"></div>
                    </div>
                </div>
                <div id="sidebar-node" style="display:none;"></div>
            </div>
        </div>
        <div id="main">
            <div id="filters"></div>
            <div id="canvas-container"></div>
            <div id="legend"></div>
            <div id="zoom-controls">
                <button id="zoom-in" title="Zoom In">+</button>
                <span id="zoom-level">100%</span>
                <button id="zoom-out" title="Zoom Out">−</button>
                <button id="zoom-fit" title="Fit to Screen">⊡</button>
            </div>
            <div id="tooltip"></div>
        </div>
    </div>
    <script>
        // ============================================================
        // DATA: Clusters, Nodes, Edges, Findings, Bugs, Fixes
        // ============================================================

        const clusters = [
            { id: 'frontend', label: 'Frontend Layer', color: '#4ea1ff', x: 100, y: 60, w: 340, h: 820 },
            { id: 'api', label: 'API Layer', color: '#7bd389', x: 500, y: 60, w: 300, h: 500 },
            { id: 'auth', label: 'Authentication Layer', color: '#c792ea', x: 860, y: 60, w: 300, h: 420 },
            { id: 'booking', label: 'Booking System', color: '#ffb86b', x: 500, y: 600, w: 300, h: 280 },
            { id: 'turfs', label: 'Turf Management', color: '#4ea1ff', x: 860, y: 520, w: 300, h: 360 },
            { id: 'database', label: 'Database Layer', color: '#ff6b9d', x: 1220, y: 60, w: 280, h: 500 },
            { id: 'external', label: 'External Systems', color: '#f5b942', x: 1220, y: 600, w: 280, h: 280 },
        ];

        const nodes = [
            // ---- Frontend Layer ----
            {
                id: 'app-wrapper', cluster: 'frontend', x: 100, y: 100,
                role: 'Root React component that manages splash screen lifecycle and conditionally renders the main App component after a 3.5s timeout.',
                plain: 'The starting screen that shows a splash animation when you first open the app, then loads the main app after a few seconds.',
                path: 'components/src/components/AppWrapper.tsx',
                notes: ['Splash screen timeout: 3500ms', 'Conditional rendering pattern', 'No loading state for splash assets', 'Tight coupling to SplashScreen component'],
                tag: 'entry', critical: false
            },
            {
                id: 'app', cluster: 'frontend', x: 100, y: 170,
                role: 'Main App component with React Router route definitions, lazy-loaded pages, QueryClientProvider, TooltipProvider, and Sonner toast integration. Defines all frontend routes including admin and client panels.',

                path: 'components/App.tsx',
                notes: ['Lazy loading via React.lazy() for all pages', 'TanStack Query client initialized', 'AdminRoute/ClientRoute guard components', 'Profiler wrapper in DEV mode for ClientDashboard'],
                tag: 'router', critical: true
            },
            {

            {

                role: 'Fixed bottom navigation bar with icon-based tab navigation for Home, Bookings, Offers, More sections.',
                plain: 'The bottom menu bar that lets you jump between the main sections of the app.',
                path: 'components/src/layout/BottomNav.tsx',
                notes: ['Fixed position bottom bar', 'Icon + label navigation', 'Active route highlighting'],
                tag: 'layout', critical: true
            },
            {
                id: 'home', cluster: 'frontend', x: 100, y: 430,
                role: 'Home page with hero carousel, search bar, location filter, category pills, turf cards grid, offers section, and upcoming bookings. Fetches data from both legacy API and new service layer.',

            {

            {

            {

            { severity: 'high', title: 'No Rate Limiting', desc: 'No rate limiting on any endpoint — OTP requests, admin login, booking creation. Vulnerable to brute force and DoS attacks.' },
            { severity: 'high', title: 'SQLite in Production', desc: 'Database defaults to SQLite (sqlite:///./play_turf.db). SQLite has concurrency limitations and is unsuitable for production workloads.' },
            { severity: 'high', title: 'Mock Payment System', desc: 'Payment processing is entirely placeholder. No payment gateway integrated. Bookings are created without actual payment.' },
            { severity: 'medium', title: 'Placeholder SMS Service', desc: 'OTP request endpoint returns 202 but no SMS is sent. The entire OTP flow is non-functional without a real SMS provider.' },
            { severity: 'medium', title: 'Placeholder Notification Services', desc: 'No email, push notification, or real-time notification system implemented. Users get no booking confirmations.' },
            { severity: 'medium', title: 'Supabase Not Wired', desc: 'Supabase client returns null. All services fall back to mock data. The service layer has TODO placeholders instead of real queries.' },
            { severity: 'medium', title: 'Client-Side Only Lockout', desc: 'Admin login lockout is enforced only on the client side. Server has no rate limiting or lockout mechanism.' },
            { severity: 'medium', title: 'No Token Rotation', desc: 'Refresh token endpoint issues new tokens without validating or rotating the old refresh token.' },
            { severity: 'low', title: 'Local Image Storage', desc: 'Turf images are stored locally in assets/. No CDN or cloud storage integration. Not scalable for production.' },
            { severity: 'low', title: 'No WebSocket Fallback', desc: 'WebSocket client has no fallback if the server does not support WebSocket connections.' },
            { severity: 'low', title: 'No Booking Status Machine', desc: 'Booking status transitions (PENDING→CONFIRMED→COMPLETED) are not enforced. Any status change is possible via direct DB access.' },
            { severity: 'low', title: 'Overlapping Slot Detection', desc: 'Conflict detection only checks exact start_time match, not overlapping time ranges. A 2-hour booking starting at 06:00 conflicts with a 1-hour booking at 06:00 but not 07:00.' },
        ];

        const KNOWN_BUGS = {
            'otp-verification': ['Hardcoded OTP "123456" accepted for any phone', 'No OTP expiry time check', 'No rate limiting on verification attempts'],
            'booking-creation': ['No time-range overlap check — only exact start_time', 'No payment validation before booking creation', 'Amount calculation does not include peak-hour pricing'],
            'refresh-token': ['No token rotation — old refresh token remains valid', 'No refresh token expiry validation', 'Subject is hardcoded as "user:session"'],
            'api-client': ['Mock mode does not simulate network latency', 'localStorage operations are synchronous and can block UI', 'No request retry logic for transient failures'],
            'turf-listing': ['City filter uses ilike but no city autocomplete', 'No sorting options (price, rating, distance)', 'Popular flag is manually set, not algorithmically determined'],
            'admin': ['No pagination for large datasets', 'CSV export does not include all turf fields', 'No audit log for admin actions'],
            'websocket-server': ['No authentication for WebSocket connections in all cases', 'No reconnection state recovery', 'Broadcast does not filter by user permissions'],
        };

        const FIXES = {
            'otp-verification': ['Replace hardcoded OTP with real TOTP generation', 'Add OTP expiry (5 min TTL)', 'Add rate limiting (max 5 attempts per phone/hour)', 'Integrate SMS gateway (Twilio, MSG91)'],
            'jwt-creation': ['Change default JWT secret in production .env', 'Consider RS256 instead of HS256 for key rotation', 'Add token versioning for invalidation'],
            'payment-trigger': ['Integrate Razorpay or Stripe', 'Add webhook handler for payment confirmation', 'Implement payment_id generation and tracking', 'Add refund flow for cancellations'],
            'booking-creation': ['Add time-range overlap detection', 'Implement peak-hour pricing logic', 'Add booking confirmation email/SMS', 'Add booking cancellation with refund logic'],
            'turf-listing': ['Add sorting by price, rating, distance', 'Add city autocomplete', 'Implement algorithmic popularity scoring', 'Add distance-based nearby search with PostGIS'],
            'fastapi-entry': ['Replace SQLite with PostgreSQL in production', 'Add request rate limiting middleware', 'Add structured logging with request IDs', 'Add health check with dependency status'],
            'websocket-server': ['Add proper WebSocket authentication', 'Implement reconnection state recovery', 'Add user-permission-based broadcast filtering', 'Add connection health monitoring'],
        };

        // ============================================================
        // RENDERER
        // ============================================================

        const container = document.getElementById('canvas-container');
        const tooltip = document.getElementById('tooltip');
        const sidebarDefault = document.getElementById('sidebar-default');
        const sidebarNode = document.getElementById('sidebar-node');
        const findingsList = document.getElementById('findings-list');
        const filtersEl = document.getElementById('filters');
        const legendEl = document.getElementById('legend');

        let scale = 1;
        let panX = 0, panY = 0;
        let isPanning = false, startX, startY;
        let selectedNodeId = null;
        let activeFilter = 'overview';
        let svg, mainGroup;

        const clusterColors = {
            frontend: '#4ea1ff',
            api: '#7bd389',
            auth: '#c792ea',
            booking: '#ffb86b',
            turfs: '#4ea1ff',
            database: '#ff6b9d',
            external: '#f5b942',
        };

        const edgeTypeColors = {
            critical: '#ff3860',
            api: '#4ea1ff',
            db: '#ff6b9d',
            auth: '#c792ea',
            payment: '#f5b942',
            websocket: '#7bd389',
            normal: '#8a8a8a',
        };

        function init() {
            renderFindings();
            renderFilters();
            renderLegend();
            renderSVG();
            updateStats();
            setupZoom();
            setupPan();
            selectNode(null);
        }

        function renderFindings() {
            findingsList.innerHTML = FINDINGS.map(f => `
    <div class="findings-item">
      <h4><span class="severity severity-${f.severity}">${f.severity}</span> ${f.title}</h4>
      <p>${f.desc}</p>
    </div>
  `).join('');
        }

        function renderFilters() {
            const filters = [
                { id: 'overview', label: 'Overview' },
                { id: 'auth', label: 'Authentication' },
                { id: 'booking', label: 'Booking' },
                { id: 'payment', label: 'Payments' },
                { id: 'search', label: 'Search' },
                { id: 'admin', label: 'Admin' },
                { id: 'user-flow', label: 'User Flow' },
                { id: 'database', label: 'Database' },
                { id: 'realtime', label: 'Realtime' },
                { id: 'critical', label: 'Critical Path' },
                { id: 'security', label: 'Security Risks' },
                { id: 'roadmap', label: 'Roadmap & Bugs' },
                { id: 'all-wires', label: 'Show All Wires' },
            ];
            filtersEl.innerHTML = filters.map(f => `
    <button class="filter-chip ${f.id === activeFilter ? 'active' : ''}" data-filter="${f.id}">${f.label}</button>
  `).join('');
            filtersEl.querySelectorAll('.filter-chip').forEach(btn => {
                btn.addEventListener('click', () => {
                    filtersEl.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeFilter = btn.dataset.filter;
                    applyFilter();
                });
            });
        }

        function renderLegend() {
            const items = [
                { color: '#4ea1ff', label: 'Frontend' },
                { color: '#7bd389', label: 'API' },
                { color: '#c792ea', label: 'Auth' },
                { color: '#ffb86b', label: 'Booking' },
                { color: '#ff6b9d', label: 'Database' },
                { color: '#f5b942', label: 'External' },
                { color: '#ff3860', label: 'Critical' },
            ];
            legendEl.innerHTML = items.map(i => `
    <div class="legend-item"><span class="legend-dot" style="background:${i.color}"></span>${i.label}</div>
  `).join('');
        }

        function renderSVG() {
            const totalW = 1800;
            const totalH = 1000;

            svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('viewBox', `0 0 ${totalW} ${totalH}`);
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');

            // Defs
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            defs.innerHTML = `
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8a8a8a" />
    </marker>
    <marker id="arrowhead-critical" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff3860" />
    </marker>
    <marker id="arrowhead-auth" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#c792ea" />
    </marker>
    <marker id="arrowhead-api" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ea1ff" />
    </marker>
    <marker id="arrowhead-db" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff6b9d" />
    </marker>
    <marker id="arrowhead-payment" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f5b942" />
    </marker>
    <marker id="arrowhead-websocket" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7bd389" />
    </marker>
  `;
            svg.appendChild(defs);

            mainGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            svg.appendChild(mainGroup);

            container.innerHTML = '';
            container.appendChild(svg);

            renderClusters();
            renderEdges();
            renderNodes();
            applyFilter();
        }

        function renderClusters() {
            clusters.forEach(c => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', c.x);
                rect.setAttribute('y', c.y);
                rect.setAttribute('width', c.w);
                rect.setAttribute('height', c.h);
                rect.setAttribute('class', 'cluster-bg');
                rect.setAttribute('stroke', c.color);
                rect.setAttribute('stroke-opacity', '0.3');
                g.appendChild(rect);

                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', c.x + 16);
                label.setAttribute('y', c.y + 28);
                label.setAttribute('class', 'cluster-label');
                label.setAttribute('fill', c.color);
                label.textContent = c.label;
                g.appendChild(label);

                const count = nodes.filter(n => n.cluster === c.id).length;
                const countText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                countText.setAttribute('x', c.x + c.w - 16);
                countText.setAttribute('y', c.y + 28);
                countText.setAttribute('class', 'cluster-count');
                countText.setAttribute('text-anchor', 'end');
                countText.textContent = `${count} nodes`;
                g.appendChild(countText);

                mainGroup.appendChild(g);
            });
        }

        function renderNodes() {
            nodes.forEach(n => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.setAttribute('class', 'node-group');
                g.dataset.nodeId = n.id;

                const cluster = clusters.find(c => c.id === n.cluster);
                const color = cluster ? cluster.color : '#8a8a8a';

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', n.x);
                rect.setAttribute('y', n.y);
                rect.setAttribute('width', 200);
                rect.setAttribute('height', 48);
                rect.setAttribute('rx', 8);
                rect.setAttribute('class', 'node-bg');
                rect.setAttribute('fill', 'var(--panel)');
                rect.setAttribute('stroke', color);
                rect.setAttribute('stroke-width', '1.5');
                g.appendChild(rect);

                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', n.x + 100);
                label.setAttribute('y', n.y + 22);
                label.setAttribute('class', 'node-label');
                label.textContent = n.id.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                g.appendChild(label);

                const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                sub.setAttribute('x', n.x + 100);
                sub.setAttribute('y', n.y + 38);
                sub.setAttribute('class', 'node-sub');
                sub.textContent = n.tag;
                g.appendChild(sub);

                if (n.critical) {
                    const crit = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    crit.setAttribute('x', n.x + 190);
                    crit.setAttribute('y', n.y + 14);
                    crit.setAttribute('class', 'node-tag');
                    crit.setAttribute('fill', '#ff3860');
                    crit.setAttribute('font-size', '7px');
                    crit.textContent = '● CRITICAL';
                    g.appendChild(crit);
                }

                // Check for bugs
                if (KNOWN_BUGS[n.id]) {
                    const bugIcon = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    bugIcon.setAttribute('x', n.x + 6);
                    bugIcon.setAttribute('y', n.y + 14);
                    bugIcon.setAttribute('font-size', '10px');
                    bugIcon.setAttribute('fill', '#ffaa00');
                    bugIcon.textContent = '⚠';
                    g.appendChild(bugIcon);
                }

                g.addEventListener('click', () => selectNode(n.id));
                g.addEventListener('mouseenter', (e) => showTooltip(e, n));
                g.addEventListener('mouseleave', hideTooltip);

                mainGroup.appendChild(g);
            });
        }

        function renderEdges() {
            edges.forEach(e => {
                const fromNode = nodes.find(n => n.id === e.from);
                const toNode = nodes.find(n => n.id === e.to);
                if (!fromNode || !toNode) return;

                const x1 = fromNode.x + 200;
                const y1 = fromNode.y + 24;
                const x2 = toNode.x;
                const y2 = toNode.y + 24;

                const cx1 = x1 + Math.abs(x2 - x1) * 0.4;
                const cy1 = y1;
                const cx2 = x2 - Math.abs(x2 - x1) * 0.4;
                const cy2 = y2;

                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const d = `M ${x1} ${y1} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}`;
                path.setAttribute('d', d);
                path.setAttribute('class', `edge-line flow-arrow flow-arrow-${e.type}`);
                path.dataset.edgeFrom = e.from;
                path.dataset.edgeTo = e.to;
                path.dataset.edgeType = e.type;
                path.dataset.edgeFeature = e.feature;

                // Marker
                const markerMap = {
                    critical: 'url(#arrowhead-critical)',
                    auth: 'url(#arrowhead-auth)',
                    api: 'url(#arrowhead-api)',
                    db: 'url(#arrowhead-db)',
                    payment: 'url(#arrowhead-payment)',
                    websocket: 'url(#arrowhead-websocket)',
                    normal: 'url(#arrowhead)',
                };
                path.setAttribute('marker-end', markerMap[e.type] || 'url(#arrowhead)');

                mainGroup.appendChild(path);

                // Edge label at midpoint
                const midX = (x1 + x2) / 2;
                const midY = (y1 + y2) / 2 - 10;

                const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                label.setAttribute('x', midX);
                label.setAttribute('y', midY);
                label.setAttribute('class', 'edge-label');
                label.textContent = e.label;
                mainGroup.appendChild(label);

                const typeLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                typeLabel.setAttribute('x', midX);
                typeLabel.setAttribute('y', midY + 12);
                typeLabel.setAttribute('class', 'edge-type-label');
                typeLabel.setAttribute('fill', edgeTypeColors[e.type] || '#8a8a8a');
                typeLabel.textContent = e.type;
                mainGroup.appendChild(typeLabel);
            });
        }

        function applyFilter() {
            const filter = activeFilter;

            // Show/hide edges
            document.querySelectorAll('.edge-line').forEach(el => {
                const type = el.dataset.edgeType;
                const feature = el.dataset.edgeFeature;
                let visible = true;

                if (filter === 'overview') visible = type === 'critical';
                else if (filter === 'auth') visible = type === 'auth' || feature === 'authentication';
                else if (filter === 'booking') visible = feature === 'booking' || type === 'critical';
                else if (filter === 'payment') visible = type === 'payment';
                else if (filter === 'search') visible = feature === 'search' || feature === 'turf-listing';
                else if (filter === 'admin') visible = feature === 'admin';
                else if (filter === 'user-flow') visible = type === 'critical';
                else if (filter === 'database') visible = type === 'db';
                else if (filter === 'realtime') visible = type === 'websocket';
                else if (filter === 'critical') visible = type === 'critical';
                else if (filter === 'security') visible = type === 'auth';
                else if (filter === 'roadmap') visible = true;
                else if (filter === 'all-wires') visible = true;

                el.style.display = visible ? '' : 'none';
            });

            // Show/hide edge labels
            document.querySelectorAll('.edge-label, .edge-type-label').forEach(el => {
                const sibling = el.previousElementSibling || el.nextElementSibling;
                if (sibling && sibling.tagName === 'path') {
                    el.style.display = sibling.style.display;
                } else {
                    el.style.display = '';
                }
            });

            // Show/hide nodes based on connected edges
            if (filter !== 'all-wires' && filter !== 'overview' && filter !== 'roadmap') {
                const visibleEdges = document.querySelectorAll('.edge-line[style*="display: block"], .edge-line:not([style*="display: none"])');
                const visibleNodeIds = new Set();
                visibleEdges.forEach(e => {
                    visibleNodeIds.add(e.dataset.edgeFrom);
                    visibleNodeIds.add(e.dataset.edgeTo);
                });

                document.querySelectorAll('.node-group').forEach(g => {
                    const nid = g.dataset.nodeId;
                    if (filter === 'overview' || filter === 'all-wires' || filter === 'roadmap') {
                        g.style.display = '';
                    } else if (filter === 'security') {
                        const node = nodes.find(n => n.id === nid);
                        g.style.display = (node && (node.tag === 'security' || node.cluster === 'auth')) ? '' : 'none';
                    } else if (filter === 'database') {
                        const node = nodes.find(n => n.id === nid);
                        g.style.display = (node && node.cluster === 'database') ? '' : 'none';
                    } else if (filter === 'realtime') {
                        const node = nodes.find(n => n.id === nid);
                        g.style.display = (node && (node.tag === 'realtime' || nid === 'websocket-client' || nid === 'websocket-server')) ? '' : 'none';
                    } else if (filter === 'admin') {
                        const node = nodes.find(n => n.id === nid);
                        g.style.display = (node && (nid === 'admin' || nid === 'client-pages' || nid === 'api-client' || nid === 'admin-login' || nid === 'admin-attempt-tracker')) ? '' : 'none';
                    } else if (filter === 'user-flow') {
                        g.style.display = visibleNodeIds.has(nid) ? '' : 'none';
                    } else if (filter === 'critical') {
                        const node = nodes.find(n => n.id === nid);
                        g.style.display = (node && node.critical) ? '' : 'none';
                    } else {
                        g.style.display = visibleNodeIds.has(nid) ? '' : 'none';
                    }
                });
            } else {
                document.querySelectorAll('.node-group').forEach(g => g.style.display = '');
            }

            updateStats();
        }

        function selectNode(nodeId) {
            selectedNodeId = nodeId;

            // Update visual selection
            document.querySelectorAll('.node-group').forEach(g => g.classList.remove('selected'));
            if (nodeId) {
                const el = document.querySelector(`.node-group[data-node-id="${nodeId}"]`);
                if (el) el.classList.add('selected');
            }

            // Update sidebar
            if (!nodeId) {
                sidebarDefault.style.display = 'block';
                sidebarNode.style.display = 'none';
                return;
            }

            sidebarDefault.style.display = 'none';
            sidebarNode.style.display = 'block';

            const node = nodes.find(n => n.id === nodeId);
            if (!node) return;

            const cluster = clusters.find(c => c.id === node.cluster);
            const color = cluster ? cluster.color : '#8a8a8a';

            const incoming = edges.filter(e => e.to === nodeId);
            const outgoing = edges.filter(e => e.from === nodeId);
            const bugs = KNOWN_BUGS[nodeId] || [];
            const fixes = FIXES[nodeId] || [];

            sidebarNode.innerHTML = `
    <div class="sidebar-section">
      <h3 style="color:${color}">${node.id.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')}</h3>
      <p style="margin-top:4px"><span class="tag tag-${node.cluster}">${node.cluster}</span>${node.critical ? ' <span class="tag tag-critical">critical</span>' : ''}${KNOWN_BUGS[nodeId] ? ' <span class="tag tag-warning">has bugs</span>' : ''}</p>
    </div>
    <div class="sidebar-section">
      <h3>Technical Role</h3>
      <p>${node.role}</p>
    </div>
    <div class="sidebar-section">
      <h3>Plain English</h3>
      <p>${node.plain}</p>
    </div>
    <div class="sidebar-section">
      <h3>Source Path</h3>
      <p style="font-family:monospace;font-size:12px;color:var(--muted)">${node.path}</p>
    </div>
    <div class="sidebar-section">
      <h3>Implementation Notes</h3>
      <ul class="notes-list">
        ${node.notes.map(n => `<li>${n}</li>`).join('')}
      </ul>
    </div>
    <div class="sidebar-section">
      <h3>Incoming Edges (${incoming.length})</h3>
      <ul class="edge-list">
        ${incoming.length ? incoming.map(e => `<li><span class="edge-type edge-${e.type}">${e.type}</span> from <strong>${e.from}</strong> — ${e.label}</li>`).join('') : '<li style="color:var(--muted)">None</li>'}
      </ul>
    </div>
    <div class="sidebar-section">
      <h3>Outgoing Edges (${outgoing.length})</h3>
      <ul class="edge-list">
        ${outgoing.length ? outgoing.map(e => `<li><span class="edge-type edge-${e.type}">${e.type}</span> to <strong>${e.to}</strong> — ${e.label}</li>`).join('') : '<li style="color:var(--muted)">None</li>'}
      </ul>
    </div>
    ${bugs.length ? `<div class="sidebar-section"><h3>Known Bugs</h3><ul class="notes-list">${bugs.map(b => `<li style="color:var(--critical)">${b}</li>`).join('')}</ul></div>` : ''}
    ${fixes.length ? `<div class="sidebar-section"><h3>Roadmap Fixes</h3><ul class="notes-list">${fixes.map(f => `<li style="color:var(--success)">${f}</li>`).join('')}</ul></div>` : ''}
  `;
        }

        function showTooltip(e, node) {
            const rect = container.getBoundingClientRect();
            tooltip.innerHTML = `<h4>${node.id.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ')}</h4><p>${node.plain}</p>`;
            tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
            tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
            tooltip.classList.add('visible');
        }

        function hideTooltip() {
            tooltip.classList.remove('visible');
        }

        function updateStats() {
            const visibleNodes = document.querySelectorAll('.node-group[style*="display: block"], .node-group:not([style*="display: none"])').length;
            const visibleEdges = document.querySelectorAll('.edge-line[style*="display: block"], .edge-line:not([style*="display: none"])').length;
            document.getElementById('stat-nodes').textContent = `● ${visibleNodes} nodes`;
            document.getElementById('stat-edges').textContent = `─ ${visibleEdges} edges`;
            document.getElementById('stat-clusters').textContent = `▣ ${clusters.length} clusters`;
        }

        function setupZoom() {
            const zoomIn = document.getElementById('zoom-in');
            const zoomOut = document.getElementById('zoom-out');
            const zoomFit = document.getElementById('zoom-fit');
            const zoomLevel = document.getElementById('zoom-level');

            function updateZoom() {
                mainGroup.setAttribute('transform', `translate(${panX},${panY}) scale(${scale})`);
                zoomLevel.textContent = Math.round(scale * 100) + '%';
            }

            zoomIn.addEventListener('click', () => { scale = Math.min(scale * 1.2, 3); updateZoom(); });
            zoomOut.addEventListener('click', () => { scale = Math.max(scale / 1.2, 0.3); updateZoom(); });
            zoomFit.addEventListener('click', () => {
                scale = 0.7;
                panX = 0;
                panY = 0;
                updateZoom();
            });

            svg.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                scale = Math.max(0.3, Math.min(3, scale * delta));
                updateZoom();
            });
        }

        function setupPan() {
            svg.addEventListener('mousedown', (e) => {
                if (e.target.tagName === 'svg' || e.target === mainGroup) {
                    isPanning = true;
                    startX = e.clientX - panX;
                    startY = e.clientY - panY;
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (!isPanning) return;
                panX = e.clientX - startX;
                panY = e.clientY - startY;
                mainGroup.setAttribute('transform', `translate(${panX},${panY}) scale(${scale})`);
            });

            window.addEventListener('mouseup', () => { isPanning = false; });
        }

        // ============================================================
        // INIT
        // ============================================================
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
